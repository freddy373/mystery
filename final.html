ss="container"> <div id="questionSection"> <h1>FINAL DECISION</h1> <div class="subtitle"> You accept going to Sokhna... right? 🌊 </div> <div class="buttons"> <button class="yes" onclick="acceptDecision()">YES</button> <button class="no" onclick="rejectDecision()">NO</button> </div> </div> <div id="resultSection" class="hidden"> <img id="resultImage" class="resultImage" src=""> <div id="message" class="message"></div> <div id="character" class="character hidden"> 🥺 </div> </div> </div> <audio id="celebrationSound"> <source src="https://www.soundjay.com/human/cheering-01.mp3" type="audio/mpeg"> </audio>

<script>
emailjs.init({
    publicKey: "_YMl3xFyJ1I_XDZqB"
});

function sendEmail(decision) {
    emailjs.send("service_oqsq6gn", "template_9tzycye", {
        decision: decision,
        time: new Date().toLocaleString()

function acceptDecision() {
    sendEmail("YES");

    document.getElementById("questionSection").classList.add("hidden");
    document.getElementById("resultSection").classList.remove("hidden");

    document.getElementById("resultImage").src = "happy.jpeg";
    document.getElementById("message").innerText = "LET'S GOOOO 🎉 Sokhna is happening!";
}

function rejectDecision() {
    sendEmail("NO");

    document.getElementById("questionSection").classList.add("hidden");
    document.getElementById("resultSection").classList.remove("hidden");

    document.getElementById("resultImage").src = "sad.jpeg";
    document.getElementById("message").innerText = "You rejected Sokhna 💔";

</script>
