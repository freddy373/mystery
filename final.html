<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Sokhna Decision</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#001f3f,#0074D9,#7FDBFF);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
    width:90%;
    max-width:800px;
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:20px;
}

button{
    padding:15px 30px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.yes{background:green;color:white;}
.no{background:red;color:white;}

.hidden{display:none;}

img{
    width:250px;
    margin-top:20px;
    border-radius:20px;
}
</style>
</head>

<body>

<div class="container">

    <div id="questionSection">
        <h1>Final Decision</h1>
        <p>Are you going to Sokhna?</p>

        <button class="yes" onclick="acceptDecision()">YES</button>
        <button class="no" onclick="rejectDecision()">NO</button>
    </div>

    <div id="resultSection" class="hidden">
        <img id="resultImage">
        <h2 id="message"></h2>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init({
    publicKey: "_YMl3xFyJ1I_XDZqB"
});

function sendEmail(decision) {
    emailjs.send("service_oqsq6gn", "template_9tzycye", {
        decision: decision,
        time: new Date().toLocaleString()
    })
    .then((response) => {
        console.log("EMAIL SENT ✅", response);
    })
    .catch((error) => {
        console.log("EMAIL ERROR ❌", error);
    });
}

function acceptDecision() {
    sendEmail("YES");

    document.getElementById("questionSection").classList.add("hidden");
    document.getElementById("resultSection").classList.remove("hidden");

    document.getElementById("resultImage").src = "happy.jpeg";
    document.getElementById("message").innerText = "LET'S GOOOO 🎉 Sokhna is happening!";
}

function rejectDecision() {
    sendEmail("NO");

    document.getElementById("questionSection").classList.add("hidden");
    document.getElementById("resultSection").classList.remove("hidden");

    document.getElementById("resultImage").src = "sad.jpeg";
    document.getElementById("message").innerText = "You rejected Sokhna 💔";
}
</script>
</body>
</html>
